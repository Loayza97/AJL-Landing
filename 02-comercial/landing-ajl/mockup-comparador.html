<!doctype html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AJL Nutrición · Mockup por secciones</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #080810;
    --surface: #0f0f1a;
    --border: rgba(255,255,255,.07);
    --text: #e8e8f0;
    --muted: rgba(232,232,240,.45);
    --gold: #D4A843;
    --radius: 14px;
  }

  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif; overflow: hidden; }

  /* ── Header ──────────────────────────── */
  header {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: 54px;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 18px;
    background: rgba(8,8,16,.9);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }

  .header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--gold);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: .5; transform: scale(.85); }
  }

  .header-title {
    font-size: 12px;
    font-weight: 600;
    letter-spacing: .06em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .header-badge {
    font-size: 11px;
    font-weight: 700;
    background: rgba(212,168,67,.12);
    color: var(--gold);
    padding: 3px 9px;
    border-radius: 999px;
    border: 1px solid rgba(212,168,67,.2);
  }

  .controls {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .controls button {
    background: var(--surface);
    color: var(--muted);
    border: 1px solid var(--border);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    letter-spacing: .02em;
  }

  .controls button:hover {
    background: rgba(255,255,255,.05);
    color: var(--text);
    border-color: rgba(255,255,255,.14);
  }

  .controls button.active {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
  }

  .controls-sep {
    width: 1px;
    height: 20px;
    background: var(--border);
    margin: 0 4px;
  }

  .btn-open-all {
    background: transparent;
    color: var(--gold);
    border: 1px solid rgba(212,168,67,.3);
    padding: 7px 14px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    transition: all .2s;
  }

  .btn-open-all:hover {
    background: rgba(212,168,67,.08);
    border-color: var(--gold);
  }

  /* ── Main grid ───────────────────────── */
  main {
    position: fixed;
    top: 54px; left: 0; right: 0; bottom: 0;
    padding: 10px;
    display: grid;
    gap: 10px;
    transition: grid-template-columns .4s cubic-bezier(.4,0,.2,1),
                grid-template-rows .4s cubic-bezier(.4,0,.2,1);
  }

  main.l-6 { grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr; }
  main.l-4 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr 1fr; }
  main.l-2 { grid-template-columns: 1fr 1fr; grid-template-rows: 1fr; }
  main.l-1 { grid-template-columns: 1fr; grid-template-rows: 1fr; }

  /* ── Frame ───────────────────────────── */
  .frame {
    position: relative;
    border-radius: var(--radius);
    overflow: hidden;
    background: #fff;
    border: 1px solid var(--border);
    transition: opacity .35s, transform .35s, box-shadow .3s;
    cursor: default;
  }

  .frame:hover { box-shadow: 0 0 0 1px rgba(212,168,67,.3), 0 20px 60px rgba(0,0,0,.5); }

  .frame.hidden {
    opacity: 0;
    pointer-events: none;
    transform: scale(.96);
    position: absolute;
    width: 0; height: 0;
    overflow: hidden;
  }

  .frame iframe {
    width: 100%; height: 100%;
    border: 0;
    display: block;
    pointer-events: none; /* let click-through to frame actions */
  }

  /* ── Frame label / actions ───────────── */
  .frame-label {
    position: absolute;
    top: 10px; left: 10px;
    z-index: 5;
    background: rgba(8,8,16,.88);
    color: #fff;
    padding: 5px 11px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 700;
    letter-spacing: .07em;
    text-transform: uppercase;
    backdrop-filter: blur(10px);
    pointer-events: none;
    border: 1px solid var(--border);
    white-space: nowrap;
  }

  .frame-actions {
    position: absolute;
    top: 10px; right: 10px;
    z-index: 5;
    display: flex;
    gap: 5px;
    opacity: 0;
    transition: opacity .2s;
  }

  .frame:hover .frame-actions { opacity: 1; }

  .frame-actions a, .frame-actions button {
    background: rgba(8,8,16,.88);
    color: #fff;
    border: 1px solid var(--border);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    cursor: pointer;
    text-decoration: none;
    backdrop-filter: blur(10px);
    transition: background .15s;
    font-family: inherit;
  }

  .frame-actions a:hover, .frame-actions button:hover {
    background: rgba(212,168,67,.9);
    color: #000;
    border-color: var(--gold);
  }

  /* ── Section picker (bottom) ─────────── */
  #picker {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 200;
    display: flex;
    gap: 5px;
    background: rgba(8,8,16,.92);
    padding: 6px 8px;
    border-radius: 999px;
    border: 1px solid var(--border);
    backdrop-filter: blur(20px);
    transition: opacity .3s;
  }

  #picker.hidden { opacity: 0; pointer-events: none; }

  #picker button {
    background: transparent;
    color: var(--muted);
    border: none;
    width: 32px; height: 32px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 700;
    cursor: pointer;
    letter-spacing: .03em;
    transition: all .2s;
    font-family: inherit;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #picker button:hover { color: var(--text); background: rgba(255,255,255,.06); }
  #picker button.active { background: var(--text); color: var(--bg); }

  /* ── Scroll to section toast ─────────── */
  .scroll-hint {
    position: absolute;
    bottom: 10px; left: 50%;
    transform: translateX(-50%);
    z-index: 5;
    background: rgba(8,8,16,.88);
    color: var(--muted);
    font-size: 10px;
    font-weight: 600;
    padding: 5px 12px;
    border-radius: 999px;
    border: 1px solid var(--border);
    backdrop-filter: blur(10px);
    pointer-events: none;
    white-space: nowrap;
    letter-spacing: .04em;
    text-transform: uppercase;
  }

  /* ── Enter animation ─────────────────── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .frame { animation: fadeUp .5s ease both; }
  .frame:nth-child(1) { animation-delay: .05s; }
  .frame:nth-child(2) { animation-delay: .1s; }
  .frame:nth-child(3) { animation-delay: .15s; }
  .frame:nth-child(4) { animation-delay: .2s; }
  .frame:nth-child(5) { animation-delay: .25s; }
  .frame:nth-child(6) { animation-delay: .3s; }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div class="dot"></div>
    <span class="header-title">AJL Nutrición · Landing Sections</span>
    <span class="header-badge">6 secciones</span>
  </div>
  <div class="controls">
    <button data-layout="6" class="active">Las 6</button>
    <button data-layout="4">Ver 4</button>
    <button data-layout="2">Comparar 2</button>
    <button data-layout="1">Full</button>
    <div class="controls-sep"></div>
    <a class="btn-open-all" href="mockup-v2.html" target="_blank">Abrir completo ↗</a>
  </div>
</header>

<main class="l-6" id="grid">

  <div class="frame" data-id="hero">
    <span class="frame-label">01 · Hero</span>
    <div class="frame-actions">
      <a href="mockup-v2.html#hero-section" target="_blank">Abrir →</a>
      <button onclick="copySection('hero')">Copiar ID</button>
    </div>
    <iframe id="f-hero" src="mockup-v2.html" title="Hero"></iframe>
    <span class="scroll-hint">Scroll para explorar</span>
  </div>

  <div class="frame" data-id="frustracion">
    <span class="frame-label">02 · Por qué fallaste</span>
    <div class="frame-actions">
      <a href="mockup-v2.html#frustracion" target="_blank">Abrir →</a>
    </div>
    <iframe id="f-frustracion" src="mockup-v2.html#frustracion" title="Frustración"></iframe>
  </div>

  <div class="frame" data-id="metodo">
    <span class="frame-label">03 · El Método</span>
    <div class="frame-actions">
      <a href="mockup-v2.html#metodo" target="_blank">Abrir →</a>
    </div>
    <iframe id="f-metodo" src="mockup-v2.html#metodo" title="Método"></iframe>
  </div>

  <div class="frame" data-id="planes">
    <span class="frame-label">04 · Planes</span>
    <div class="frame-actions">
      <a href="mockup-v2.html#planes" target="_blank">Abrir →</a>
    </div>
    <iframe id="f-planes" src="mockup-v2.html#planes" title="Planes"></iframe>
  </div>

  <div class="frame" data-id="para-quien">
    <span class="frame-label">05 · Para quién</span>
    <div class="frame-actions">
      <a href="mockup-v2.html#para-quien" target="_blank">Abrir →</a>
    </div>
    <iframe id="f-para-quien" src="mockup-v2.html#para-quien" title="Para quién"></iframe>
  </div>

  <div class="frame" data-id="evaluacion">
    <span class="frame-label">06 · Evaluación S/80</span>
    <div class="frame-actions">
      <a href="mockup-v2.html#evaluacion" target="_blank">Abrir →</a>
    </div>
    <iframe id="f-evaluacion" src="mockup-v2.html#evaluacion" title="Evaluación"></iframe>
  </div>

</main>

<div id="picker" class="hidden">
  <button data-id="hero">01</button>
  <button data-id="frustracion">02</button>
  <button data-id="metodo">03</button>
  <button data-id="planes">04</button>
  <button data-id="para-quien">05</button>
  <button data-id="evaluacion">06</button>
</div>

<script>
  const grid    = document.getElementById('grid');
  const picker  = document.getElementById('picker');
  const frames  = Array.from(document.querySelectorAll('.frame'));
  const ctrlBtns = document.querySelectorAll('.controls button[data-layout]');
  const pickerBtns = Array.from(picker.querySelectorAll('button'));

  let currentLayout = 6;
  let activeIds = new Set(['hero','frustracion','metodo','planes','para-quien','evaluacion']);

  // ── Layout switching ────────────────
  ctrlBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const n = parseInt(btn.dataset.layout);
      setLayout(n);
      ctrlBtns.forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
    });
  });

  function setLayout(n) {
    currentLayout = n;
    grid.className = 'l-' + n;

    if (n === 6) {
      picker.classList.add('hidden');
      activeIds = new Set(['hero','frustracion','metodo','planes','para-quien','evaluacion']);
      renderFrames();
    } else {
      picker.classList.remove('hidden');
      // keep only first n active
      const ids = ['hero','frustracion','metodo','planes','para-quien','evaluacion'];
      activeIds = new Set(ids.slice(0, n));
      syncPickerState();
      renderFrames();
    }
  }

  // ── Picker ──────────────────────────
  pickerBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      if (activeIds.has(id)) {
        if (activeIds.size <= 1) return; // keep at least 1
        activeIds.delete(id);
      } else {
        if (activeIds.size >= currentLayout) {
          // remove the first one
          const [first] = activeIds;
          activeIds.delete(first);
        }
        activeIds.add(id);
      }
      syncPickerState();
      renderFrames();
    });
  });

  function syncPickerState() {
    pickerBtns.forEach(b => {
      b.classList.toggle('active', activeIds.has(b.dataset.id));
    });
  }

  function renderFrames() {
    if (currentLayout === 6) {
      frames.forEach(f => {
        f.classList.remove('hidden');
        f.style.cssText = '';
      });
      return;
    }
    frames.forEach(f => {
      const visible = activeIds.has(f.dataset.id);
      f.classList.toggle('hidden', !visible);
      if (visible) {
        f.style.cssText = '';
      }
    });
    // re-order visible to front
    const ids = ['hero','frustracion','metodo','planes','para-quien','evaluacion'];
    [...activeIds].forEach(id => {
      const f = grid.querySelector(`.frame[data-id="${id}"]`);
      if (f) grid.insertBefore(f, picker);
    });
  }

  // ── Scroll iframes to section on load ─
  const scrollTargets = {
    'f-hero':        null,
    'f-frustracion': 'frustracion',
    'f-metodo':      'metodo',
    'f-planes':      'planes',
    'f-para-quien':  'para-quien',
    'f-evaluacion':  'evaluacion',
  };

  Object.entries(scrollTargets).forEach(([iframeId, sectionId]) => {
    const iframe = document.getElementById(iframeId);
    if (!iframe) return;
    iframe.addEventListener('load', () => {
      try {
        const win = iframe.contentWindow;
        // hide nav so section fills view
        const doc = iframe.contentDocument;

        // remove fixed nav to avoid overlap
        const nav = doc.querySelector('.nav');
        if (nav) nav.style.display = 'none';

        // remove floating WhatsApp button
        const fab = doc.querySelector('.fab');
        if (fab) fab.style.display = 'none';

        if (sectionId) {
          const el = doc.getElementById(sectionId);
          if (el) {
            setTimeout(() => el.scrollIntoView({ behavior: 'instant' }), 50);
          }
        }
      } catch(e) {
        // cross-origin guard (shouldn't happen for local files)
      }
    });
  });

  // ── Copy section id util ─────────────
  function copySection(id) {
    navigator.clipboard?.writeText(`#${id}`).catch(() => {});
  }

  // ── Keyboard shortcuts ───────────────
  document.addEventListener('keydown', e => {
    const map = { '1': 1, '2': 2, '4': 4, '6': 6 };
    if (map[e.key] && !e.metaKey && !e.ctrlKey) {
      const n = map[e.key];
      const btn = document.querySelector(`.controls button[data-layout="${n}"]`);
      if (btn) btn.click();
    }
  });

  // init picker state
  syncPickerState();
</script>
</body>
</html>
